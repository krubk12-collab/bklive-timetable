<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางสอน ป.1-3 — ร.ร.ชุมชนวัดบางโค</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f1f5f9;color:#1e293b;font-size:15px}
#overlay{position:fixed;inset:0;background:rgba(248,250,252,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.spinner{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#d97706;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay-msg{font-size:.95rem;color:#475569;text-align:center;max-width:280px;line-height:1.6}
.app-header{background:linear-gradient(135deg,#92400e 0%,#d97706 100%);color:#fff;padding:18px 28px;box-shadow:0 2px 12px rgba(6,95,70,.35);display:flex;justify-content:space-between;align-items:center}
.app-header h1{font-size:1.3rem;font-weight:700}
.app-header p{font-size:.85rem;opacity:.8;margin-top:3px}
.btn-log-link{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 16px;font-family:'Sarabun',sans-serif;font-size:.85rem;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .15s}
.btn-log-link:hover{background:rgba(255,255,255,.3)}
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;padding:0 28px;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.tab-btn{padding:14px 22px;border:none;background:none;font-family:'Sarabun',sans-serif;font-size:.95rem;font-weight:500;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn:hover{color:#d97706}
.tab-btn.active{color:#d97706;border-bottom-color:#d97706;font-weight:600}
.content{padding:24px 28px;max-width:1440px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.stat-card{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 1px 5px rgba(0,0,0,.07);display:flex;align-items:center;gap:18px}
.stat-icon{font-size:2.2rem;line-height:1}
.stat-num{font-size:2.2rem;font-weight:700;color:#d97706;line-height:1}
.stat-label{font-size:.82rem;color:#64748b;margin-top:3px}
.section-card{background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:20px}
.section-title{font-size:1rem;font-weight:600;color:#1e293b;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f1f5f9}
.bar-row{display:flex;align-items:center;margin-bottom:9px;gap:10px}
.bar-name{width:170px;font-size:.8rem;text-align:right;flex-shrink:0;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#f1f5f9;border-radius:6px;height:28px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#fbbf24,#d97706);display:flex;align-items:center;padding:0 10px;min-width:36px}
.bar-count{font-size:.78rem;font-weight:700;color:#fff;white-space:nowrap}
.bar-count-ext{font-size:.78rem;color:#64748b;padding-left:8px}
.area-grid{display:flex;flex-wrap:wrap;gap:8px}
.area-badge{border-radius:20px;padding:6px 14px;font-size:.82rem;font-weight:500;display:inline-flex;align-items:center;gap:8px}
.badge-cnt{background:rgba(0,0,0,.12);border-radius:10px;padding:1px 8px;font-weight:700;font-size:.78rem}
.view-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.view-ctrl label{font-size:.9rem;font-weight:600;color:#475569}
.view-select{padding:9px 16px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'Sarabun',sans-serif;font-size:.95rem;background:#fff;color:#1e293b;cursor:pointer;outline:none;min-width:200px}
.view-select:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(52,211,153,.12)}
.count-chip{display:inline-flex;align-items:center;gap:7px;background:#fffbeb;color:#d97706;padding:7px 16px;border-radius:20px;font-size:.88rem;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#475569}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.tt-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0}
.tt{border-collapse:collapse;width:100%;min-width:820px}
.tt th,.tt td{border:1px solid #e8edf2}
.th-period{background:#f8fafc;text-align:center;padding:7px 4px;vertical-align:middle}
.th-period .pnum{font-size:.82rem;font-weight:700;color:#d97706;display:block}
.th-period .ptime{font-size:.63rem;color:#94a3b8;display:block;margin-top:1px}
.th-day{background:#f8fafc;font-size:.82rem;font-weight:600;text-align:center;padding:6px 10px;color:#334155;min-width:62px;width:62px}
.td-break{background:#f8fafc;text-align:center;font-size:.65rem;color:#94a3b8;padding:4px 3px;width:40px;min-width:40px;vertical-align:middle}
.td-cell{vertical-align:top;width:110px;min-width:100px;height:64px;padding:0}
.cell-inner{height:100%;min-height:62px;padding:5px 7px;display:flex;flex-direction:column;justify-content:center;cursor:default;transition:filter .15s}
.cell-inner:hover{filter:brightness(.93)}
.cell-subj{font-size:.72rem;font-weight:600;line-height:1.35}
/* คาบสอนนอกช่วงชั้น (เช่น พลศึกษา ป.4-6 ของครูชลธิชา) — ตัวแดง เฉพาะหน้ารายครู */
.cell-ext .cell-subj,.cell-ext .cell-meta{color:#dc2626!important;font-weight:700}
.cell-ext{outline:1.5px dashed #fca5a5;outline-offset:-2px}
.cell-meta{font-size:.63rem;opacity:.75;margin-top:2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-empty{background:#fff;height:100%;min-height:62px}
.ticker-wrap{background:linear-gradient(90deg,#92400e,#d97706);border-radius:12px;overflow:hidden;margin-bottom:18px;height:40px;display:flex;align-items:center}
.ticker-label{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.65);white-space:nowrap;padding:0 14px 0 16px;border-right:1px solid rgba(255,255,255,.2);flex-shrink:0;letter-spacing:.05em}
.ticker-outer{flex:1;overflow:hidden;height:40px;display:flex;align-items:center}
.ticker-track{display:inline-flex;align-items:center;white-space:nowrap;animation:tickerScroll 100s linear infinite;will-change:transform}
.ticker-track:hover{animation-play-state:paused}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-sep{color:rgba(255,255,255,.4);font-size:.8rem;margin:0 14px;font-weight:700}
.t-item{display:inline-flex;align-items:center;gap:6px;margin:0 6px}
.t-room{background:rgba(255,255,255,.22);color:#fff;border-radius:4px;padding:1px 6px;font-size:.72rem;font-weight:700}
.t-subj{font-size:.78rem;color:#fff;font-weight:500}
.t-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.live-card{margin-bottom:20px}
.live-active{border-left:4px solid #ef4444}
.live-break{border-left:4px solid #f59e0b}
.live-off-card{border-left:4px solid #e2e8f0}
.live-hdr{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.live-pulse{width:11px;height:11px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:lpulse 1.2s ease-in-out infinite}
@keyframes lpulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{transform:scale(1.4);box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.live-badge{border-radius:5px;padding:3px 10px;font-size:.75rem;font-weight:800;letter-spacing:.06em}
.act-badge{background:#ef4444;color:#fff}
.brk-badge{background:#f59e0b;color:#fff}
.pre-badge{background:#0ea5e9;color:#fff}
.off-badge{background:#e2e8f0;color:#64748b}
.live-ts{font-size:.87rem;color:#475569;font-weight:500}
.live-pchip{background:#fffbeb;color:#d97706;border-radius:6px;padding:3px 12px;font-size:.82rem;font-weight:600}
.live-mins{color:#94a3b8;font-size:.78rem;margin-left:auto;font-style:italic}
.live-prog{height:5px;background:#f1f5f9;border-radius:3px;margin-bottom:14px;overflow:hidden}
.live-prog-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b,#ef4444);border-radius:3px;transition:width 1s}
.live-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.live-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc}
.live-room{background:#92400e;color:#fff;border-radius:5px;padding:2px 8px;font-size:.74rem;font-weight:700;flex-shrink:0;width:46px;text-align:center}
.live-sname{border-radius:5px;padding:2px 9px;font-size:.78rem;font-weight:600;flex-shrink:0;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-tname{font-size:.82rem;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.live-empty{font-size:.78rem;color:#cbd5e1;font-style:italic}
.live-next{margin-top:0;font-size:.82rem;color:#64748b;padding:7px 12px;background:#f8fafc;border-radius:7px}
.live-off-msg{color:#94a3b8;font-size:.9rem;margin-top:6px}
.sc-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f1f5f9;flex-wrap:wrap;gap:8px}
.scroll-btns{display:flex;gap:6px}
.scroll-btn{border:1.5px solid #e2e8f0;background:#fff;border-radius:8px;padding:5px 12px;font-family:'Sarabun',sans-serif;font-size:.82rem;cursor:pointer;color:#475569;transition:all .15s}
.scroll-btn:hover{background:#f1f5f9;border-color:#cbd5e1}
.scroll-now{background:#fffbeb;color:#d97706;border-color:#fcd34d;font-weight:600}
.scroll-now:hover{background:#fef3c7}
.today-outer{overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0}
.today-tbl{border-collapse:collapse;min-width:800px;width:100%}
.today-tbl th,.today-tbl td{border:1px solid #e8edf2}
.tbl-room-hdr{background:#f8fafc;width:56px;min-width:56px;text-align:center;padding:7px 4px}
.tbl-ph{background:#f8fafc;text-align:center;padding:7px 4px;min-width:105px}
.tbl-ph .tpn{font-size:.78rem;font-weight:700;color:#d97706;display:block}
.tbl-ph .tpt{font-size:.62rem;color:#94a3b8;display:block;margin-top:1px}
.tbl-ph.t-now{background:#fffbeb}
.tbl-brk-hdr{background:#f8fafc;width:32px;min-width:32px;text-align:center;font-size:.6rem;color:#94a3b8;padding:4px 2px}
.tbl-room{font-size:.75rem;font-weight:700;color:#334155;background:#f8fafc;text-align:center;padding:4px 6px;white-space:nowrap}
.tbl-cell{padding:5px 5px;min-height:60px;vertical-align:top}
.tbl-cell.t-now{background:#fffbeb;outline:2px solid #fbbf24;outline-offset:-2px}
.tbl-cell.t-past{opacity:.4}
.tbl-brk{background:#f8fafc}
.tsubj{font-size:.68rem;font-weight:600;border-radius:3px;padding:2px 4px;line-height:1.35;margin-bottom:2px}
.ttch{font-size:.61rem;color:#64748b;padding-left:4px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-dash{font-size:.7rem;color:#e2e8f0}
.a-thai{background:#fef2f2;color:#991b1b}
.a-math{background:#eff6ff;color:#1e40af}
.a-sci {background:#fffbeb;color:#166534}
.a-soc {background:#fffbeb;color:#92400e}
.a-eng {background:#f5f3ff;color:#5b21b6}
.a-pe  {background:#ecfeff;color:#155e75}
.a-art {background:#fdf4ff;color:#7e22ce}
.a-work{background:#fff7ed;color:#9a3412}
.a-act {background:#f9fafb;color:#374151}
.sup-role{border-radius:5px;padding:1px 8px;font-size:.72rem;font-weight:700;white-space:nowrap}
@media(max-width:640px){
  .content{padding:16px}
  .stat-grid{grid-template-columns:1fr}
  .tabs{padding:0 8px}
  .tab-btn{padding:12px 10px;font-size:.85rem}
  .live-mins{display:none}
  .app-header{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <div id="overlay-msg">กำลังโหลดข้อมูล...</div>
</div>

<header class="app-header">
  <div>
    <h1>ตารางสอน ปีการศึกษา 2569</h1>
    <p>โรงเรียนชุมชนวัดบางโค &nbsp;·&nbsp; ระดับประถมศึกษา ป.1–3 &nbsp;·&nbsp; ภาคเรียนที่ 1</p>
  </div>
  <a id="log-link" href="#" class="btn-log-link" target="_blank">📝 บันทึกการเข้าสอน →</a>
</header>

<nav class="tabs">
  <button class="tab-btn active"  onclick="switchTab('overview',this)">📊 ภาพรวม</button>
  <button class="tab-btn"         onclick="switchTab('byRoom',this)">🏫 รายห้องเรียน</button>
  <button class="tab-btn"         onclick="switchTab('byTeacher',this)">👨‍🏫 รายครู</button>
  <button class="tab-btn"         onclick="switchTab('teachLog',this)">📋 ดูบันทึกการสอน</button>
  <button class="tab-btn"         onclick="switchTab('supervise',this)">🔍 นิเทศการสอน</button>
</nav>

<main class="content">
  <div id="tab-overview" class="tab-panel active">
    <div class="ticker-wrap" id="ticker-wrap">
      <span class="ticker-label">วันนี้</span>
      <div class="ticker-outer"><div class="ticker-track" id="ticker-track"></div></div>
    </div>
    <div id="live-now"></div>
    <div id="today-timeline"></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon">👨‍🏫</div><div><div class="stat-num" id="stat-teachers">—</div><div class="stat-label">ครูผู้สอน (ประถมศึกษา)</div></div></div>
      <div class="stat-card"><div class="stat-icon">🏫</div><div><div class="stat-num">6</div><div class="stat-label">ห้องเรียน (ป.1–ป.3)</div></div></div>
      <div class="stat-card"><div class="stat-icon">📚</div><div><div class="stat-num" id="stat-periods">—</div><div class="stat-label">คาบสอนต่อสัปดาห์</div></div></div>
    </div>
    <div class="section-card">
      <div class="section-title">ภาระงานสอน (คาบ/สัปดาห์)</div>
      <div id="workload-chart"></div>
    </div>
    <div class="section-card">
      <div class="section-title">สัดส่วนคาบตามกลุ่มสาระ</div>
      <div class="area-grid" id="area-breakdown"></div>
    </div>
  </div>

  <div id="tab-byRoom" class="tab-panel">
    <div class="view-ctrl">
      <label>ห้องเรียน:</label>
      <select id="room-select" class="view-select" onchange="renderRoomView()">
        <option value="P11">ป.1/1</option><option value="P12">ป.1/2</option>
        <option value="P21">ป.2/1</option><option value="P22">ป.2/2</option>
        <option value="P31">ป.3/1</option><option value="P32">ป.3/2</option>
      </select>
    </div>
    <div id="legend-room" class="legend"></div>
    <div class="section-card" style="padding:16px">
      <div class="tt-wrap"><table class="tt" id="room-table"></table></div>
    </div>
  </div>

  <div id="tab-byTeacher" class="tab-panel">
    <div class="view-ctrl">
      <label>ครู:</label>
      <select id="teacher-select" class="view-select" onchange="renderTeacherView()"></select>
      <div id="teacher-chip" class="count-chip" style="display:none"></div>
    </div>
    <div id="legend-teacher" class="legend"></div>
    <div class="section-card" style="padding:16px">
      <div class="tt-wrap"><table class="tt" id="teacher-table"></table></div>
    </div>
  </div>

  <div id="tab-teachLog" class="tab-panel">
    <div class="view-ctrl">
      <label>📅 วันที่:</label>
      <input type="date" id="log-date" class="view-select" style="min-width:auto" onchange="renderTeachLogView()">
      <button class="scroll-btn scroll-now" onclick="logDateShift(-1)">◀ เมื่อวาน</button>
      <button class="scroll-btn scroll-now" onclick="logDateToday()">วันนี้</button>
      <button class="scroll-btn scroll-now" onclick="logDateShift(1)">พรุ่งนี้ ▶</button>
      <div id="log-date-chip" class="count-chip" style="display:none"></div>
      <select id="reportRoom" class="view-select" style="min-width:auto;padding:6px 10px;margin-left:auto">
        <option value="">ทุกห้อง (6 ห้อง)</option>
        <option value="P11">ป.1/1</option><option value="P12">ป.1/2</option>
        <option value="P21">ป.2/1</option><option value="P22">ป.2/2</option>
        <option value="P31">ป.3/1</option><option value="P32">ป.3/2</option>
      </select>
      <button class="scroll-btn" id="reportDayBtn" style="background:#ea580c;color:#fff;border-color:#ea580c;font-weight:600" onclick="reportDay()">📤 ส่งรายงานลงชีต</button>
      <span id="reportMsg" style="font-size:13px;font-weight:600;align-self:center;flex-basis:100%"></span>
    </div>
    <div id="legend-teachlog" class="legend"></div>
    <div class="section-card" style="padding:16px">
      <div class="today-outer" id="teachlog-table-wrap"></div>
    </div>
  </div>

  <div id="tab-supervise" class="tab-panel">
    <div class="view-ctrl">
      <a id="sup-plan-link" href="#" target="_blank" class="btn-log-link" style="background:#7c3aed;border-color:#7c3aed">📝 วางแผนนิเทศของฉัน →</a>
      <button class="scroll-btn" onclick="setSupView('supervisee',this)" id="supv-supervisee">รายครูผู้รับนิเทศ</button>
      <button class="scroll-btn" onclick="setSupView('supervisor',this)" id="supv-supervisor">รายผู้นิเทศ</button>
      <button class="scroll-btn" onclick="setSupView('date',this)" id="supv-date">ปฏิทินรวม</button>
      <button class="scroll-btn scroll-now" onclick="loadSupervision(true)">↻ รีเฟรช</button>
      <div id="sup-chip" class="count-chip" style="display:none"></div>
    </div>
    <div id="sup-legend" class="legend"></div>
    <div class="section-card" style="padding:16px">
      <div class="today-outer" id="sup-wrap"></div>
    </div>
  </div>
</main>

<script>
// ⚙️ ตั้งค่า URL ของ GAS สำหรับบันทึกการสอน/นิเทศ ป.1-3
// (deploy timetable_log.gs แยกสำหรับ ป.1-3 แล้วใส่ URL ที่นี่)
const LOG_URL = 'https://script.google.com/macros/s/AKfycbyiMSBBZkEzgem_6z4RFWNA4bBYhLWeIGiJS0hkchfssXX05VsoCQVuW5hoOyoDkhTLFA/exec';
document.getElementById('log-link').href = LOG_URL || '#';
document.getElementById('sup-plan-link').href = LOG_URL ? LOG_URL + '?page=supervision' : '#';

// ── ข้อมูลครู ──
const T = {
  SP:'สุปภาดา แซ่เตียว', JN:'จีระนันท์ อิศรศักดิ์ ณ อยุธยา',
  AS:'อาริศษา งาช้าง',   JP:'จุฑาพร จิตรสุนนท์',
  MN:'มนัสพร สุดสาคร',   CL:'ชลธิชา แสงโชติ',
  AP:'อภิญญา บุตรพรม',  CP:'ชนาพร อาจหยุด',
  KR:'ขวัญเรือน สุขโชติ',PW:'พิมลวรรณ คงเมือง',
  SU:'สินีนุช พูลพัฒนา', SW:'เสาวนีย์ จูเกต',
  NT:'ณัฏฐ์ ศรีสุพัฒน์', ST:'สถาพร เพ็งยอดวงษ์',
  TP:'ฐิติพล เกตุเอี่ยม',JD:'Mr. John Dave Sulit'

// ── build lookup maps ──
let roomMap={}, teacherMap={}, tCount={};
function buildLookups(){
  roomMap={};teacherMap={};tCount={};
  SCH_RAW.forEach(([cid,subj,tkeys,day,per,ext])=>{
    if(!roomMap[cid])roomMap[cid]={};
    if(!roomMap[cid][day])roomMap[cid][day]={};
    roomMap[cid][day][per]={subj,tkeys};
    tkeys.split('+').forEach(tk=>{
      if(!teacherMap[tk])teacherMap[tk]={};
      if(!teacherMap[tk][day])teacherMap[tk][day]={};
      teacherMap[tk][day][per]={subj,cid,ext};
      tCount[tk]=(tCount[tk]||0)+1;
    });
  });
}

function areaCss(subj){return AREA_CSS[AREA_OF[subj]||'']||'a-act';}
function teacherName(tkeys){return tkeys.split('+').map(k=>T[k]||k).join(' / ');}
function toMins(h,m){return h*60+m;}
function fmtMins(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;}
function jsDay(d){return(d>=1&&d<=5)?d:0;}
function getCurPeriod(tm){for(const[s,e,p]of PB)if(tm>=s&&tm<e)return{p,s,e};return null;}
function getNextRealPeriod(tm){for(const[s,e,p]of PB)if(p>0&&tm<s)return{p,s,e};return null;}
function legendHtml(used){return Object.entries(AREA_DOT).filter(([a])=>used.has(a)).map(([a,col])=>`<div class="leg-item"><div class="leg-dot" style="background:${col}"></div>${a}</div>`).join('');}
function statusLegendHtml(used){return Object.entries(STATUS).filter(([k])=>used.has(k)).map(([k,v])=>`<div class="leg-item"><div class="leg-dot" style="background:${v.color}"></div>${v.icon} ${v.label}</div>`).join('');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isoToday(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtShortTH(s){if(!s||s.length<10)return s||'';const[y,m,d]=s.slice(0,10).split('-').map(Number);const M=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return`${d} ${M[m]}`;}

// ── ticker ──
function buildTicker(dow){
  const track=document.getElementById('ticker-track');if(!track)return;
  if(!dow){document.getElementById('ticker-wrap').style.display='none';return;}
  let items='';
  TEACH_PERIODS.forEach(p=>{
    const hasAny=ROOM_ORDER.some(cid=>roomMap[cid]?.[dow]?.[p]);
    if(!hasAny)return;
    items+=`<span class="t-sep">◆ ${PERIOD_LABEL[p]}</span>`;
    ROOM_ORDER.forEach(cid=>{
      const ent=roomMap[cid]?.[dow]?.[p];if(!ent)return;
      const area=AREA_OF[ent.subj]||'';
      const dot=AREA_DOT[area]||'#9ca3af';
      items+=`<span class="t-item"><span class="t-room">${CL_MAP[cid]}</span><span class="t-dot" style="background:${dot}"></span><span class="t-subj">${ent.subj} · ${teacherName(ent.tkeys)}</span></span>`;
    });
  });
  track.innerHTML=items+'&nbsp;&nbsp;&nbsp;&nbsp;'+items;
}

// ── live now ──
function renderLiveNow(){
  const el=document.getElementById('live-now');if(!el)return;
  const now=new Date();const dow=jsDay(now.getDay());
  const h=now.getHours(),m=now.getMinutes();const tm=toMins(h,m);
  const ts=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} น.`;
  const dayName=DAY_TH[dow]||'';
  const wrap=(cls,inner)=>`<div class="section-card live-card ${cls}">${inner}</div>`;
  if(!dow){el.innerHTML=wrap('live-off-card',`<div class="live-hdr"><span class="live-badge off-badge">📅 วันหยุด</span><span class="live-ts">${ts}</span></div><p class="live-off-msg">ไม่มีการเรียนการสอน</p>`);return;}
  const cur=getCurPeriod(tm);
  if(!cur&&tm<PB[0][0]){el.innerHTML=wrap('live-off-card',`<div class="live-hdr"><span class="live-badge pre-badge">🌅 ก่อนเรียน</span><span class="live-ts">วัน${dayName} · ${ts}</span></div><p class="live-off-msg">เริ่มโฮมรูม 08:20 น. เรียนคาบแรก 08:30 น.</p>`);return;}
  if(!cur&&tm>=PB[PB.length-1][1]){el.innerHTML=wrap('live-off-card',`<div class="live-hdr"><span class="live-badge off-badge">🏠 เลิกเรียนแล้ว</span><span class="live-ts">วัน${dayName} · ${ts}</span></div><p class="live-off-msg">สิ้นสุดคาบ 7 เวลา 15:30 น.</p>`);return;}
  if(cur&&cur.p===-1){const nxt=getNextRealPeriod(tm);el.innerHTML=wrap('live-break',`<div class="live-hdr"><span class="live-badge brk-badge">🍱 พักกลางวัน</span><span class="live-ts">วัน${dayName} · ${ts}</span><span class="live-pchip">11:30–12:30 น.</span></div><div class="live-next">${nxt?`ถัดไป → ${PERIOD_LABEL[nxt.p]} เวลา ${fmtMins(nxt.s)} น.`:''}</div>`);return;}
  if(cur&&cur.p===0){el.innerHTML=wrap('live-break',`<div class="live-hdr"><span class="live-badge brk-badge">🏠 โฮมรูม</span><span class="live-ts">วัน${dayName} · ${ts}</span><span class="live-pchip">08:20–08:30 น.</span></div>`);return;}
  if(cur&&cur.p>0){
    const mLeft=cur.e-tm;const pct=Math.min(100,Math.round((1-mLeft/(cur.e-cur.s))*100));
    const nxt=getNextRealPeriod(tm);
    const nxtTxt=cur.p===4?'ถัดไป → พักกลางวัน 11:30 น.':nxt?`ถัดไป → ${PERIOD_LABEL[nxt.p]} (${fmtMins(nxt.s)} น.)` :'';
    const rows=ROOM_ORDER.map(cid=>{
      const ent=roomMap[cid]?.[dow]?.[cur.p];
      if(!ent)return`<div class="live-row"><span class="live-room">${CL_MAP[cid]}</span><span class="live-empty">— ว่าง —</span></div>`;
      const ac=areaCss(ent.subj);
      return`<div class="live-row"><span class="live-room">${CL_MAP[cid]}</span><span class="live-sname ${ac}">${ent.subj}</span><span class="live-tname">${teacherName(ent.tkeys)}</span></div>`;
    }).join('');
    el.innerHTML=wrap('live-active',`<div class="live-hdr"><span class="live-pulse"></span><span class="live-badge act-badge">LIVE</span><span class="live-ts">วัน${dayName} · ${ts}</span><span class="live-pchip">${PERIOD_LABEL[cur.p]} · ${fmtMins(cur.s)}–${fmtMins(cur.e)} น.</span><span class="live-mins">${mLeft} นาทีคงเหลือ</span></div><div class="live-prog"><div class="live-prog-bar" style="width:${pct}%"></div></div><div class="live-rows">${rows}</div><div class="live-next">${nxtTxt}</div>`);
  }
}

function buildTodayTd(ent,p,curP,tm){
  const isNow=curP===p,isPast=P2[p]&&tm>=P2[p].e;

  return`<td class="${cls}"><div class="tsubj ${ac}">${ent.subj}</div><div class="ttch">${teacherName(ent.tkeys)}</div></td>`;
}

// ── teaching log (ผ่าน GAS LOG_URL) ──
let teachLogData={byRoom:{}},teachLogDate='';
async function logApi(params){
  if(!LOG_URL)throw new Error('ยังไม่ได้ตั้งค่า LOG_URL');
  const qs=new URLSearchParams(params).toString();
  const res=await fetch(`${LOG_URL}?${qs}`);return res.json();
}
function logDateToday(){document.getElementById('log-date').value=isoToday();renderTeachLogView();}
function logDateShift(delta){const di=document.getElementById('log-date');const base=di.value||isoToday();const d=new Date(base);d.setDate(d.getDate()+delta);di.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;renderTeachLogView();}
async function renderTeachLogView(){
  const dt=document.getElementById('log-date').value;if(!dt)return;
  teachLogDate=dt;
  const wrap=document.getElementById('teachlog-table-wrap');
  wrap.innerHTML=`<div style="padding:28px;text-align:center;color:#64748b"><span class="spinner" style="width:30px;height:30px;border-width:3px;border-top-color:#d97706;display:inline-block;vertical-align:middle"></span> &nbsp;กำลังโหลด...</div>`;
  try{const d=await logApi({action:'getTeachingByDate',date:dt});teachLogData=d&&d.ok?d:{byRoom:{}};}
  catch(e){wrap.innerHTML=`<div style="padding:28px;text-align:center;color:#ef4444">❌ ${esc(e.message)}</div>`;return;}

function drawTeachLogTable(){
  const wrap=document.getElementById('teachlog-table-wrap');

  const dateStr=new Date(dt).toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  if(!dow){wrap.innerHTML=`<div style="padding:28px;text-align:center;color:#94a3b8">📅 ${dateStr}<br>วันหยุด</div>`;document.getElementById('legend-teachlog').innerHTML='';return;}

  thead+=`<th class="tbl-brk-hdr">พัก</th>`;
  [5,6,7].forEach(p=>thead+=`<th class="tbl-ph"><div class="tpn">${PERIOD_LABEL[p]}</div><div class="tpt">${fmtMins(P2[p].s)}</div></th>`);
  thead+=`</tr>`;

    tbody+=`<tr><td class="tbl-room">${CL_MAP[cid]}</td>`;

function teachLogCell(byRoom,cid,p,dow,used){
  const log=byRoom[cid]&&byRoom[cid][p];
  if(log){
    const st=STATUS[log.status]||{icon:'📘',color:'#9ca3af',label:log.status};used.add(log.status);
    const topicHtml=log.topic?`<div class="ttch">📝 ${esc(log.topic)}</div>`:'';
    let main,sub;
    if(log.status==='swap'){main=`🔄 แลกคาบ: ${esc(log.swap_subject||'-')}`;sub=(log.substitute_teacher_name?`<div class="ttch">👤 ${esc(log.substitute_teacher_name)}</div>`:'')+topicHtml;}
    else if(log.substitute_teacher_name){main=`👤 สอนแทน`;sub=`<div class="ttch"><b>${esc(log.substitute_teacher_name)}</b></div>`+(log.subject_name?`<div class="ttch">${esc(log.subject_name)}</div>`:'')+topicHtml;}
    else if(log.status==='taught'){main=`${st.icon} ${esc(log.subject_name||'สอนปกติ')}`;sub=topicHtml+`<div class="ttch">${esc(log.teacher_name)}</div>`;}
    else{main=`${st.icon} ${esc(st.label)}`;sub=(log.subject_name?`<div class="ttch">${esc(log.subject_name)}</div>`:'')+topicHtml;}
    return`<td class="tbl-cell" style="border-left:3px solid ${st.color}"><div class="tsubj" style="background:${st.color}1f;color:${st.color}">${main}</div>${sub}</td>`;
  }
  const ent=roomMap[cid]?.[dow]?.[p];
  if(ent)return`<td class="tbl-cell" style="opacity:.5"><div class="tsubj" style="background:#f1f5f9;color:#94a3b8">${esc(ent.subj)}</div><div class="ttch" style="color:#cbd5e1">— ยังไม่บันทึก —</div></td>`;
  return`<td class="tbl-cell"><span class="t-dash">—</span></td>`;
}
async function reportDay(){
  const dt=document.getElementById('log-date').value||isoToday();
  const roomSel=document.getElementById('reportRoom');const classId=roomSel?roomSel.value:'';
  const btn=document.getElementById('reportDayBtn');const msg=document.getElementById('reportMsg');
  const old=btn.innerHTML;btn.disabled=true;btn.innerHTML='⏳ กำลังสร้างรายงาน...';
  if(msg){msg.textContent='';msg.style.color='';}
  try{
    const d=await logApi({action:'buildDailyReport',date:dt,classId});
    if(d&&d.ok){if(msg){msg.style.color='#ea580c';msg.textContent=`✅ ส่งรายงานแล้ว รวม ${d.count} คาบ`;}}
    else{if(msg){msg.style.color='#dc2626';msg.textContent='❌ '+((d&&d.error)||'ไม่สำเร็จ');}}
  }catch(e){if(msg){msg.style.color='#dc2626';msg.textContent='❌ '+esc(e.message);}}
  finally{btn.disabled=false;btn.innerHTML=old;}
}

  if(supLoaded&&!force){drawSupervision();return;}
  const wrap=document.getElementById('sup-wrap');
  wrap.innerHTML=`<div style="padding:28px;text-align:center;color:#64748b"><span class="spinner" style="width:30px;height:30px;border-width:3px;border-top-color:#7c3aed;display:inline-block;vertical-align:middle"></span> &nbsp;กำลังโหลด...</div>`;
  try{const d=await logApi({action:'supSummary'});supData=d&&d.ok?d:null;supLoaded=true;}
  catch(e){wrap.innerHTML=`<div style="padding:28px;text-align:center;color:#ef4444">❌ ${esc(e.message)}<br><small style="color:#94a3b8">ตั้งค่า LOG_URL แล้ว deploy GAS ก่อน</small></div>`;return;}
  drawSupervision();
}
function drawSupervision(){
  const wrap=document.getElementById('sup-wrap');
  document.getElementById('sup-legend').innerHTML=Object.values(SUP_ROLE).map(r=>`<div class="leg-item"><div class="leg-dot" style="background:${r.color}"></div>${r.label}</div>`).join('');
  if(!supData){wrap.innerHTML='<div style="padding:28px;text-align:center;color:#94a3b8">ยังไม่มีข้อมูล — ตั้งค่า LOG_URL และ deploy GAS ก่อน</div>';return;}
  const q=supData.quota||{director:1,deputy:2,peer:1};const need=q.director+q.deputy+q.peer;
  const done=(supData.bySupervisee||[]).filter(t=>t.complete).length;const tot=(supData.bySupervisee||[]).length;
  const chip=document.getElementById('sup-chip');chip.style.display='inline-flex';chip.innerHTML=`✅ วางแผนครบ <strong>&nbsp;${done}/${tot}&nbsp;</strong> คน · รวม ${supData.total||0} คาบ`;
  if(supView==='supervisee')wrap.innerHTML=drawSupSupervisee(need);
  else if(supView==='supervisor')wrap.innerHTML=drawSupSupervisor();
  else wrap.innerHTML=drawSupByDate();
}
function drawSupSupervisee(need){
  const dutyMap={};(supData.bySupervisor||[]).forEach(s=>{dutyMap[s.supervisor_id]=s.observations||[];});
  const nameCell=(t)=>{
    const statusHtml=t.complete?`<span style="color:#ea580c;font-weight:700">ครบ ✓</span>`:(t.total?`<span style="color:#dc2626;font-weight:700">${t.total}/${need}</span>`:`<span style="color:#dc2626;font-weight:700">ยังไม่ได้วางแผน</span>`);
    const duties=(dutyMap[t.teacher_id]||[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')||a.period-b.period);
    const dutyHtml=duties.length?`<div class="ttch" style="margin-top:7px;color:#7c3aed;font-weight:700">🧑‍🏫 ต้องไปนิเทศเพื่อน ${duties.length} คาบ</div>`+duties.map(o=>`<div class="ttch" style="color:#7c3aed">→ ${esc(o.supervisee_name)} · ${supFmtDate(o.date)} ค.${o.period} ${PERIOD_TIME[o.period]||''}<span style="color:#94a3b8"> (${esc(o.class_name)})</span></div>`).join(''):`<div class="ttch" style="margin-top:7px;color:#94a3b8">— ไม่ต้องไปนิเทศใคร —</div>`;
    return`<b>${esc(t.name)}</b><div class="ttch">${statusHtml}</div>${dutyHtml}`;
  };
  let h=`<table class="today-tbl"><thead><tr><th class="tbl-ph" style="text-align:left;padding-left:10px">ครูผู้รับนิเทศ</th><th class="tbl-ph">บทบาท</th><th class="tbl-ph">ผู้นิเทศ</th><th class="tbl-ph">วันที่</th><th class="tbl-ph">คาบ</th><th class="tbl-ph">เวลา</th><th class="tbl-ph">ห้อง / วิชา</th></tr></thead><tbody>`;
  (supData.bySupervisee||[]).forEach(t=>{
    const picks=t.picks||[];
    if(!picks.length){h+=`<tr><td class="tbl-cell" style="padding-left:10px;vertical-align:top">${nameCell(t)}</td><td class="tbl-cell" colspan="6" style="color:#cbd5e1">— ยังไม่ได้เลือกผู้นิเทศ —</td></tr>`;return;}
    picks.forEach((p,i)=>{
      h+=`<tr>`;if(i===0)h+=`<td class="tbl-cell" rowspan="${picks.length}" style="vertical-align:top;padding-left:10px">${nameCell(t)}</td>`;
      h+=`<td class="tbl-cell">${roleTag(p.role)}</td><td class="tbl-cell">${esc(p.supervisor_name)}</td><td class="tbl-cell">${supFmtDate(p.date)}</td><td class="tbl-cell">คาบ ${p.period}</td><td class="tbl-cell" style="white-space:nowrap;color:#64748b">${PERIOD_TIME[p.period]||'-'}</td><td class="tbl-cell"><div class="tsubj" style="background:#f1f5f9;color:#475569">${esc(p.subject_name)}</div><div class="ttch">${esc(p.class_name)}</div></td></tr>`;
    });
  });
  return h+'</tbody></table>';
}
function drawSupSupervisor(){
  const list=(supData.bySupervisor||[]).slice().sort((a,b)=>{const o={director:0,deputy:1,peer:2};return(o[a.role]-o[b.role])||a.name.localeCompare(b.name,'th');});
  if(!list.length)return'<div style="padding:24px;text-align:center;color:#94a3b8">ยังไม่มีข้อมูล</div>';
  let h=`<table class="today-tbl"><thead><tr><th class="tbl-ph" style="text-align:left;padding-left:10px">ผู้นิเทศ</th><th class="tbl-ph">นิเทศครู</th><th class="tbl-ph">วันที่</th><th class="tbl-ph">คาบ</th><th class="tbl-ph">เวลา</th><th class="tbl-ph">ห้อง / วิชา</th></tr></thead><tbody>`;
  list.forEach(s=>{const obs=s.observations||[];obs.forEach((o,i)=>{h+=`<tr>`;if(i===0)h+=`<td class="tbl-cell" rowspan="${obs.length}" style="vertical-align:top;padding-left:10px"><b>${esc(s.name)}</b><div class="ttch">${roleTag(s.role)} · ${obs.length} คาบ</div></td>`;h+=`<td class="tbl-cell">${esc(o.supervisee_name)}</td><td class="tbl-cell">${supFmtDate(o.date)}</td><td class="tbl-cell">คาบ ${o.period}</td><td class="tbl-cell" style="white-space:nowrap;color:#64748b">${PERIOD_TIME[o.period]||'-'}</td><td class="tbl-cell"><div class="tsubj" style="background:#f1f5f9;color:#475569">${esc(o.subject_name)}</div><div class="ttch">${esc(o.class_name)}</div></td></tr>`;});});
  return h+'</tbody></table>';
}
function drawSupByDate(){
  const byDate=supData.byDate||{};const dates=Object.keys(byDate).filter(d=>d).sort();
  if(!dates.length)return'<div style="padding:24px;text-align:center;color:#94a3b8">ยังไม่มีข้อมูล</div>';
  let h='';
  dates.forEach(dt=>{
    const items=byDate[dt].slice().sort((a,b)=>a.period-b.period);
    h+=`<div style="font-weight:700;color:#5b21b6;margin:14px 0 6px;font-size:.92rem">📅 ${supFmtDate(dt)}</div><table class="today-tbl" style="margin-bottom:6px"><tbody>`;
    items.forEach(o=>{h+=`<tr><td class="tbl-cell" style="width:70px">คาบ ${o.period}</td><td class="tbl-cell" style="width:92px;white-space:nowrap;color:#64748b">${PERIOD_TIME[o.period]||'-'}</td><td class="tbl-cell">${roleTag(o.role)}</td><td class="tbl-cell"><b>${esc(o.supervisor_name)}</b></td><td class="tbl-cell">นิเทศ ${esc(o.supervisee_name)}</td><td class="tbl-cell"><div class="ttch">${esc(o.subject_name)} · ${esc(o.class_name)}</div></td></tr>`;});
    h+='</tbody></table>';
  });
  return h;
}

// ── tab switching ──
function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');document.getElementById('tab-'+name).classList.add('active');
  if(name==='byRoom')renderRoomView();
  if(name==='byTeacher')renderTeacherView();
  if(name==='teachLog'){const di=document.getElementById('log-date');if(!di.value)di.value=isoToday();renderTeachLogView();}
  if(name==='supervise')loadSupervision();
}

// ── init ──
function init(){
  buildLookups();
  document.getElementById('overlay').style.display='none';
  renderOverview();
  renderRoomView();
  initTeacherSelect();
  buildTicker(TODAY_DOW);
  renderLiveNow();
  renderTodayTimeline();
  setInterval(renderLiveNow,30000);
  setInterval(()=>{renderLiveNow();renderTodayTimeline();},300000);
}
init();
</script>
